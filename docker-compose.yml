services:
  # ── Next.js Application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medicare_app
    restart: unless-stopped
    extra_hosts:
      # 'host.docker.internal' resolves to the Windows host machine's IP.
      # This allows the container to reach the local PostgreSQL installation.
      - "host.docker.internal:host-gateway"
    environment:
      # ── Connect to the PostgreSQL installed on the Windows host ──────────
      DATABASE_URL: postgresql://${POSTGRES_USER:-medicare_user}:${POSTGRES_PASSWORD:-securepassword}@host.docker.internal:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-medicare}
      NODE_ENV: production
      # Security & Session
      SESSION_SECRET: ${SESSION_SECRET:-your_super_secret_base64_string_here}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Persist uploaded assets
      - app_uploads:/app/public/uploads

volumes:
  app_uploads:
